<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Club · WHS Golf</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --forest:#0B1E12; --deep:#0D2B1F; --mid:#1A4030; --sage:#3A6B4A;
  --gold:#C9A84C; --gold-lt:#E0C870; --gold-dim:#9A7830;
  --cream:#EFE9D9; --ivory:#FDFAF3; --parchment:#F5EFE3;
  --wood:#5A2A10; --text:#1A160C; --text2:#4A3E2E; --text3:#9A8E7A;
  --success:#2A6040; --danger:#8B2020;
  --r:8px; --r2:12px; --r3:16px;
  --sh:0 1px 4px rgba(11,30,18,.08),0 4px 18px rgba(11,30,18,.05);
  --sh2:0 4px 14px rgba(11,30,18,.13),0 10px 28px rgba(11,30,18,.07);
}
@media(prefers-color-scheme:dark){:root{
  --cream:#090F0C; --ivory:#0E1A12; --parchment:#131D16;
  --text:#EAE4D2; --text2:#B0A880; --text3:#706850;
  --sh:0 1px 4px rgba(0,0,0,.4),0 4px 18px rgba(0,0,0,.25);
}}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--cream);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
#app{max-width:800px;margin:0 auto;padding:14px}

/* ── HEADER ── */
.hdr{background:var(--forest);border-radius:var(--r3);margin-bottom:12px;overflow:hidden;position:relative}
.hdr::before{content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 15% 50%,rgba(201,168,76,.14) 0%,transparent 55%),
             radial-gradient(ellipse at 85% 50%,rgba(201,168,76,.09) 0%,transparent 55%),
             repeating-linear-gradient(-45deg,transparent,transparent 18px,rgba(255,255,255,.013) 18px,rgba(255,255,255,.013) 19px);
  pointer-events:none}
.hdr-inner{position:relative;display:flex;align-items:center;justify-content:space-between;padding:20px 24px}
.club-name{font-family:'Playfair Display',Georgia,serif;font-size:26px;font-weight:600;color:var(--gold);letter-spacing:.8px;line-height:1}
.club-sub{font-size:9px;color:rgba(201,168,76,.48);letter-spacing:3.5px;text-transform:uppercase;margin-top:4px}
.hdr-right{display:flex;align-items:center;gap:10px}
.club-seal{width:44px;height:44px;border:1.5px solid rgba(201,168,76,.3);border-radius:50%;display:flex;align-items:center;justify-content:center;background:rgba(201,168,76,.07);font-size:20px}
.sync{font-size:10px;padding:3px 10px;border-radius:20px;letter-spacing:.3px;font-weight:500}
.sync.ok{background:rgba(42,96,64,.25);color:#7aba96;border:0.5px solid rgba(42,96,64,.35)}
.sync.err{background:rgba(139,32,32,.2);color:#cc7777;border:0.5px solid rgba(139,32,32,.3)}
.sync.wait{background:rgba(201,168,76,.15);color:var(--gold);border:0.5px solid rgba(201,168,76,.25)}

/* ── NAV ── */
.nav{background:var(--ivory);border-radius:var(--r2);display:flex;border:0.5px solid rgba(11,30,18,.09);margin-bottom:16px;overflow:hidden;box-shadow:var(--sh)}
.nt{flex:1;background:none;border:none;border-bottom:2.5px solid transparent;padding:13px 6px 11px;font-size:10px;font-weight:700;letter-spacing:1.8px;text-transform:uppercase;cursor:pointer;color:var(--text3);font-family:inherit;transition:all .2s}
.nt.on{color:var(--gold);border-bottom-color:var(--gold);background:rgba(201,168,76,.04)}
.nt:hover:not(.on){color:var(--text2);background:rgba(11,30,18,.03)}

/* ── BACK NAV ── */
.back-nav{display:flex;align-items:center;gap:10px;margin-bottom:18px}
.back-btn{background:none;border:none;cursor:pointer;font-size:10px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--text3);font-family:inherit;display:flex;align-items:center;gap:5px;padding:0;transition:color .15s}
.back-btn:hover{color:var(--gold)}
.breadcrumb{font-family:'Playfair Display',serif;font-size:14px;color:var(--text2)}

/* ── SECTION HEADERS ── */
.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.sec-title{font-family:'Playfair Display',Georgia,serif;font-size:20px;font-weight:500;color:var(--deep);letter-spacing:.3px}
@media(prefers-color-scheme:dark){.sec-title{color:var(--gold-lt)}}

/* ── DIVIDERS ── */
.divider{height:0.5px;background:linear-gradient(90deg,transparent,rgba(201,168,76,.35),transparent);margin:16px 0}

/* ── RANK ROWS ── */
.rank-row{display:flex;align-items:center;gap:14px;padding:16px 18px;background:var(--ivory);border-radius:var(--r2);margin-bottom:9px;cursor:pointer;box-shadow:var(--sh);border:0.5px solid rgba(11,30,18,.06);border-left:3px solid transparent;transition:all .2s}
.rank-row:hover{box-shadow:var(--sh2);transform:translateY(-1px)}
.rank-row.p1{border-left-color:var(--gold)}
.rank-row.p2{border-left-color:#B8C0BC}
.rank-row.p3{border-left-color:#C9845A}
.rank-medal{width:34px;height:34px;display:flex;align-items:center;justify-content:center;border-radius:var(--r);font-size:14px;font-weight:700;flex-shrink:0}
.medal-1{background:linear-gradient(135deg,#D4B060,#C9A84C,#B89040);color:var(--deep)}
.medal-2{background:linear-gradient(135deg,#D0D8D4,#B8C0BC);color:#2A2A2A}
.medal-3{background:linear-gradient(135deg,#D49878,#C0785A);color:#2A1008}
.medal-n{background:var(--parchment);color:var(--text3)}
.rank-name{font-family:'Playfair Display',Georgia,serif;font-size:17px;font-weight:500;color:var(--text);margin-bottom:3px}
.rank-sub{font-size:11px;color:var(--text3);letter-spacing:.2px}
.rank-hi{text-align:right;flex-shrink:0;min-width:60px}
.hi-label{font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--text3);margin-bottom:2px}
.hi-val{font-family:'Playfair Display',Georgia,serif;font-size:30px;font-weight:600;color:var(--gold);line-height:1}
.hi-na{font-family:'Playfair Display',serif;font-size:22px;color:var(--text3)}
.rank-chev{color:rgba(201,168,76,.5);font-size:20px;margin-left:2px;flex-shrink:0}

/* ── STAT CARDS ── */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px}
.scard{border-radius:var(--r);padding:14px;border:0.5px solid rgba(11,30,18,.08)}
.scard.normal{background:var(--parchment)}
.scard.hero{background:var(--deep);border-color:transparent;grid-column:span 1}
.s-lbl{font-size:9px;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:6px;font-weight:600}
.scard.normal .s-lbl{color:var(--text3)}
.scard.hero .s-lbl{color:rgba(201,168,76,.55)}
.s-val{font-family:'Playfair Display',serif;font-weight:600}
.scard.normal .s-val{font-size:22px;color:var(--text)}
.scard.hero .s-val{font-size:34px;color:var(--gold);line-height:1}
@media(max-width:480px){.stats{grid-template-columns:1fr 1fr}.scard.hero{grid-column:span 2}}

/* ── CONTENT CARD ── */
.ccard{background:var(--ivory);border-radius:var(--r2);border:0.5px solid rgba(11,30,18,.08);box-shadow:var(--sh);padding:0 18px;overflow:visible}

/* ── SCORE TABLE ── */
.sthead{display:grid;grid-template-columns:1fr 54px 52px 60px 56px 28px;gap:6px;padding:11px 0 9px;font-size:9px;text-transform:uppercase;letter-spacing:1.4px;color:var(--text3);border-bottom:0.5px solid rgba(11,30,18,.1)}
.srow{display:grid;grid-template-columns:1fr 54px 52px 60px 56px 28px;gap:6px;align-items:center;padding:11px 0;border-bottom:0.5px solid rgba(11,30,18,.06);font-size:13px;cursor:pointer;transition:background .15s}
.srow:last-child{border-bottom:none}
.srow:hover{background:rgba(11,30,18,.025);margin:0 -18px;padding:11px 18px}

/* ── INFO EXPAND ── */
.icard{background:rgba(13,43,31,.05);border:0.5px solid rgba(13,43,31,.15);border-radius:var(--r);padding:14px 16px;margin:2px 0 4px;display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.ic-full{grid-column:span 3;padding-bottom:10px;border-bottom:0.5px solid rgba(11,30,18,.08);margin-bottom:6px}
.ie-lbl{font-size:9px;text-transform:uppercase;letter-spacing:1.4px;color:var(--sage);margin-bottom:4px;font-weight:700}
.ie-val{font-size:15px;font-weight:500;color:var(--deep);word-break:break-word}
@media(prefers-color-scheme:dark){.icard{background:rgba(26,64,48,.2);border-color:rgba(26,64,48,.3)}.ie-lbl{color:#9fcfbc}.ie-val{color:#c5e8d8}}

/* ── TOURNAMENT ROWS ── */
.trn-row{display:flex;align-items:center;gap:14px;padding:15px 18px;background:var(--ivory);border-radius:var(--r2);margin-bottom:9px;cursor:pointer;box-shadow:var(--sh);border:0.5px solid rgba(11,30,18,.06);transition:all .2s}
.trn-row:hover{box-shadow:var(--sh2);transform:translateY(-1px)}
.trn-icon{width:42px;height:42px;background:var(--deep);border-radius:var(--r);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.trn-name{font-family:'Playfair Display',Georgia,serif;font-size:16px;font-weight:500;color:var(--text);margin-bottom:3px}
.trn-meta{font-size:12px;color:var(--text3)}
.trn-win{font-size:12px;color:var(--gold);font-weight:600;margin-bottom:2px}

/* ── WINNER HIGHLIGHT ── */
.win-box{display:flex;align-items:center;gap:14px;padding:16px 18px;background:linear-gradient(135deg,rgba(201,168,76,.1),rgba(201,168,76,.05));border:1px solid rgba(201,168,76,.2);border-radius:var(--r2);margin-top:14px}
.win-icon{font-size:28px;flex-shrink:0}
.win-lbl{font-size:9px;text-transform:uppercase;letter-spacing:2px;color:var(--gold-dim);font-weight:700;margin-bottom:4px}
.win-name{font-family:'Playfair Display',serif;font-size:19px;font-weight:600;color:var(--deep)}
@media(prefers-color-scheme:dark){.win-name{color:var(--gold-lt)}}
.win-score{font-size:13px;color:var(--text3);margin-top:2px}

/* ── TOURNAMENT SCOREBOARD ── */
.tscore{display:grid;grid-template-columns:1fr 80px 70px;gap:8px;align-items:center;padding:12px 0;border-bottom:0.5px solid rgba(11,30,18,.07);font-size:14px}
.tscore:last-child{border-bottom:none}
.tscore-name{font-weight:500}
.tscore-val{text-align:center;font-family:'Playfair Display',serif;font-size:17px;font-weight:600}
.under{color:var(--success);font-weight:700}
.over{color:var(--danger)}
.even{color:var(--text3)}

/* ── PILLS ── */
.pill{display:inline-block;font-size:10px;padding:2px 8px;border-radius:20px;font-weight:700;letter-spacing:.4px}
.p9{background:rgba(201,168,76,.15);color:var(--gold-dim)}
.p18{background:rgba(13,43,31,.08);color:var(--mid)}
.pwon{background:var(--gold);color:var(--deep)}
.prun{background:var(--parchment);color:var(--text3)}

/* ── TROPHY PAGE ── */
.trophy-stage{text-align:center;padding:16px 0 28px}
.trophy-eyebrow{font-size:9px;letter-spacing:5px;text-transform:uppercase;color:var(--text3);margin-bottom:20px}
.trophy-champ{font-family:'Playfair Display',Georgia,serif;font-size:28px;font-weight:700;color:var(--gold);margin-top:14px;letter-spacing:.5px}
.trophy-event{font-size:12px;color:var(--text3);letter-spacing:1px;margin-top:5px}

/* ── WINNERS TABLE ── */
.honour-row{display:flex;align-items:center;gap:14px;padding:14px 0;border-bottom:0.5px solid rgba(11,30,18,.07)}
.honour-row:last-child{border-bottom:none}
.honour-pos{width:32px;height:32px;border-radius:var(--r);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;background:var(--parchment);border:0.5px solid rgba(11,30,18,.08)}
.honour-name{font-family:'Playfair Display',serif;font-size:15px;font-weight:500;color:var(--text);margin-bottom:2px}
.honour-event{font-size:12px;color:var(--text3)}
.honour-score{font-family:'Playfair Display',serif;font-size:16px;font-weight:600}

/* ── COURSE TABLE ── */
.crow{display:grid;grid-template-columns:1fr 62px 68px 60px 36px;gap:8px;align-items:center;padding:11px 0;border-bottom:0.5px solid rgba(11,30,18,.06);font-size:13px}
.crow:last-child{border-bottom:none}
.info-btn{background:none;border:1px solid rgba(11,30,18,.14);border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px;color:var(--text3);flex-shrink:0;transition:all .15s}
.info-btn:hover,.info-btn.active{background:var(--deep);color:var(--gold);border-color:var(--deep)}

/* ── INPUTS ── */
select,input{font-family:inherit;font-size:14px;padding:10px 13px;border:1px solid rgba(11,30,18,.14);border-radius:var(--r);background:var(--ivory);color:var(--text);outline:none;width:100%;transition:border-color .15s,box-shadow .15s}
select:focus,input:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,168,76,.13)}

/* ── BUTTONS ── */
.btn-p{background:var(--deep);color:var(--gold);border:none;border-radius:var(--r);padding:11px 22px;font-size:11px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;cursor:pointer;font-family:inherit;transition:all .2s}
.btn-p:hover{background:var(--mid)}
.btn-s{background:none;border:1px solid rgba(11,30,18,.14);border-radius:var(--r);padding:11px 20px;font-size:12px;cursor:pointer;color:var(--text2);font-family:inherit;transition:all .15s}
.btn-s:hover{background:var(--parchment)}
.btn-ic{background:none;border:none;cursor:pointer;color:var(--text3);font-size:16px;padding:2px 5px;border-radius:4px}
.btn-ic:hover{color:#c00;background:rgba(220,0,0,.1)}

/* ── MODAL ── */
.ov{position:fixed;inset:0;background:rgba(11,30,18,.72);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);display:flex;align-items:flex-start;justify-content:center;padding:32px 14px;z-index:100;overflow-y:auto}
.mo{background:var(--ivory);border-radius:var(--r3);border:0.5px solid rgba(201,168,76,.18);padding:28px;width:100%;max-width:460px;box-shadow:0 24px 64px rgba(11,30,18,.3)}
.mo-title{font-family:'Playfair Display',Georgia,serif;font-size:21px;font-weight:600;color:var(--deep);margin-bottom:22px}
@media(prefers-color-scheme:dark){.mo-title{color:var(--gold-lt)}}
.fr{margin-bottom:16px}
.fl{display:block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.4px;color:var(--text3);margin-bottom:6px}
.tp-row{display:grid;grid-template-columns:1fr 90px;gap:10px;align-items:center;padding:9px 0;border-bottom:0.5px solid rgba(11,30,18,.07);font-size:13px}
.tp-row:last-child{border-bottom:none}

/* ── PENDING / EMPTY STATES ── */
.pending-warn{padding:12px 16px;background:rgba(139,32,32,.07);border:0.5px solid rgba(139,32,32,.18);border-radius:var(--r);font-size:13px;color:var(--danger);margin-bottom:16px;font-weight:500}
.empty-state{text-align:center;padding:48px 20px}
.empty-icon{font-size:40px;margin-bottom:14px;opacity:.6}
.empty-title{font-family:'Playfair Display',serif;font-size:18px;color:var(--text2);margin-bottom:6px}
.empty-sub{font-size:13px;color:var(--text3)}
</style>
</head>

function rd(v,d=1){return Math.round(v*Math.pow(10,d))/Math.pow(10,d);}
function calcDiff(score,cr,sl){return rd((score-cr)*113/sl);}
function fmtScore(s){return s===0?'E':s>0?`+${s}`:`${s}`;}
function fmtDate(d){if(!d)return'';const[y,m,day]=d.split('-');return`${day}/${m}/${y}`;}
function scoreClass(s){return s<0?'under':s>0?'over':'even';}

function calcHI(scores,courses){
  const lk={};courses.forEach(c=>{lk[c.name+c.tee]=c;});
  const eff=[],n9=[];
  scores.forEach((s,i)=>{
    const c=lk[s.course+s.tee];if(!c)return;
    const d=calcDiff(s.score,c.rating,c.slope);
    c.rating<40?n9.push({i,d}):eff.push({i,d});
  });
  for(let k=0;k<n9.length-1;k+=2)
    eff.push({i:Math.max(n9[k].i,n9[k+1].i),d:rd(n9[k].d+n9[k+1].d)});
  eff.sort((a,b)=>a.i-b.i);
  const r=eff.slice(-20),cnt=r.length;
  if(cnt<3)return{hi:null,count:cnt,n:0,p9:n9.length%2===1};
  const e=WHS[Math.min(cnt,20)-3],n=e?e[1]:1;
  const best=[...r.map(x=>x.d)].sort((a,b)=>a-b).slice(0,n);
  const avg=best.reduce((a,x)=>a+x,0)/n;
  return{hi:rd(Math.min(avg,54)),count:cnt,n,avg:rd(avg,2),p9:n9.length%2===1};
}

async function push(ns){
  try{await set(dbRef,{players:ns.players,courses:ns.courses,tournaments:ns.tournaments||[],ts:Date.now()});SYNC='ok';}
  catch(e){SYNC='err';}
  render();
}

onValue(dbRef,snap=>{
  const d=snap.val();
  if(d&&d.players&&d.courses){
    let tournaments=d.tournaments||[];
    let needsSave=false;
    tournaments=tournaments.map(t=>{
      if(!t.winnerId&&t.entries&&t.entries.length){
        const best=t.entries.reduce((a,b)=>b.score<a.score?b:a);
        needsSave=true;
        return{...t,winnerId:best.playerId};
      }
      return t;
    });
    S={players:d.players,courses:d.courses,tournaments};
    SYNC='ok';
    if(needsSave)push(S);
  }else if(!INIT)push(S);
  INIT=true;render();
},()=>{SYNC='err';INIT=true;render();});

function upd(ns){S=ns;push(ns);}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function ranked(){
  return S.players.map(p=>({...p,...calcHI(p.scores,S.courses)}))
    .sort((a,b)=>a.hi===null?1:b.hi===null?-1:a.hi-b.hi);
}
function lk(){const m={};S.courses.forEach(c=>{m[c.name+c.tee]=c;});return m;}

function render(){
  const root=document.getElementById('app');
  if(!INIT){root.innerHTML='<div style="padding:70px;text-align:center;color:var(--text3);font-family:\'Playfair Display\',serif;font-size:18px">Connecting to The Club…</div>';return;}
  const R=ranked(),AP=S.players.find(p=>p.id===PID),AT=S.tournaments.find(t=>t.id===TID);
  const tabs=[['rankings','Rankings'],['tournaments','Tournaments'],['winners','Winners'],['courses','Courses']];

  let h=`<div class="hdr"><div class="hdr-inner">
    <div><div class="club-name">The Club</div><div class="club-sub">WHS Handicap &middot; Members Only</div></div>
    <div class="hdr-right">
      <span class="sync ${SC[SYNC]}">${SL[SYNC]}</span>
      <div class="club-seal">⛳</div>
    </div>
  </div></div>`;

  if(!AP&&!AT){
    h+=`<div class="nav">${tabs.map(([v,l])=>`<button class="nt${V===v?' on':''}" onclick="SV('${v}')">${l}</button>`).join('')}</div>`;
  }

  if(AP) h+=renderPlayerDetail(AP);
  else if(AT) h+=renderTournamentDetail(AT);
  else if(V==='rankings') h+=renderRanking(R);
  else if(V==='tournaments') h+=renderTournaments();
  else if(V==='winners') h+=renderWinners();
  else h+=renderCourses();

  if(MOD==='score'&&AP) h+=renderScoreModal(AP);
  if(MOD==='course') h+=renderCourseModal();
  if(MOD==='tournament') h+=renderTournamentModal();

  root.innerHTML=h;
}

    <button class="back-btn" onclick="CT()">← Tournaments</button>
  </div>
  <div class="ccard" style="padding:20px 22px;margin-bottom:14px">
    <div style="display:flex;align-items:flex-start;justify-content:space-between">
      <div>
        <div style="font-family:'Playfair Display',serif;font-size:22px;font-weight:600;color:var(--deep)">${t.name}</div>
        <div style="font-size:13px;color:var(--text3);margin-top:5px;letter-spacing:.3px">📅&ensp;${fmtDate(t.date)} &middot; ${t.entries.length} players</div>
      </div>
      <button class="btn-ic" onclick="DT('${t.id}')" style="margin-top:2px" title="Delete">🗑</button>
    </div>
    ${w?`<div class="win-box">
      <div class="win-icon">🏆</div>
      <div>
        <div class="win-lbl">Tournament Champion</div>
        <div class="win-name">${w.name}</div>
        <div class="win-score ${scoreClass(we?.score??0)}">${fmtScore(we?.score??0)}</div>
      </div>
    </div>`:''}
  </div>
  <div class="sec-head"><span class="sec-title">Scoreboard</span></div>
  <div class="ccard">
    <div style="display:grid;grid-template-columns:1fr 80px 70px;gap:8px;padding:10px 0 9px;font-size:9px;text-transform:uppercase;letter-spacing:1.4px;color:var(--text3);border-bottom:0.5px solid rgba(11,30,18,.1)">
      <span>Player</span><span style="text-align:center">Score</span><span style="text-align:center">Result</span>
    </div>`;
  sorted.forEach((e,i)=>{
    const isW=e.playerId===t.winnerId;
    const sc=scoreClass(e.score);
    h+=`<div class="tscore" style="${isW?'background:linear-gradient(90deg,rgba(201,168,76,.07),transparent);margin:0 -18px;padding:12px 18px;':''}">
      <span class="tscore-name" style="${isW?'color:var(--deep)':''}">${isW?'🏆 ':i===1?'🥈 ':i===2?'🥉 ':''}${e.playerName}</span>
      <span class="tscore-val ${sc}" style="text-align:center">${fmtScore(e.score)}</span>
      <span style="text-align:center"><span class="pill ${isW?'pwon':'prun'}">${isW?'Winner':i===1?'Runner-up':''}</span></span>
    </div>`;
  });
  return h+`</div>`;
}

// ── WINNERS TROPHY ────────────────────────────────────────────────────────────
function renderWinners(){
  const sorted=[...S.tournaments].filter(t=>t.winnerId).sort((a,b)=>b.date.localeCompare(a.date));
  const latest=sorted[0],lw=latest?S.players.find(p=>p.id===latest.winnerId):null;
  const wins={};sorted.forEach(t=>{wins[t.winnerId]=(wins[t.winnerId]||0)+1;});

  let h=`<div class="trophy-stage">
    <div class="trophy-eyebrow">Roll of Honour</div>
    ${trophySVG(lw?.name||'',latest?.name||'',latest?.date||'')}
    <div class="trophy-champ">${lw?lw.name:'Awaiting First Champion'}</div>
    ${latest?`<div class="trophy-event">${latest.name}&ensp;&middot;&ensp;${fmtDate(latest.date)}</div>`:''}
  </div>
  <div class="divider"></div>`;

  if(!sorted.length)return h+`<div class="empty-state" style="padding-top:8px"><div class="empty-sub">Add a tournament to begin the Roll of Honour</div></div>`;

  h+=`<div class="sec-head"><span class="sec-title">All Champions</span></div>
  <div class="ccard">`;
  sorted.forEach((t,i)=>{
    const w=S.players.find(p=>p.id===t.winnerId);
    const entry=t.entries.find(e=>e.playerId===t.winnerId);
    const sc=entry?.score??null;
    h+=`<div class="honour-row">
      <div class="honour-pos" style="${i===0?'background:rgba(201,168,76,.12);border-color:rgba(201,168,76,.3)':''}">${i===0?'🥇':'🏆'}</div>
      <div style="flex:1;min-width:0">
        <div class="honour-name">${w?.name||'Unknown'}</div>
        <div class="honour-event">${t.name}</div>
      </div>
      <div style="text-align:right">
        ${sc!==null?`<div class="honour-score ${scoreClass(sc)}">${fmtScore(sc)}</div>`:''}
        <div style="font-size:11px;color:var(--text3);margin-top:2px">${fmtDate(t.date)}</div>
      </div>
    </div>`;
  });
  h+=`</div>`;

  const leaders=Object.entries(wins).map(([id,c])=>({p:S.players.find(x=>x.id===id),c})).filter(x=>x.p).sort((a,b)=>b.c-a.c);
  if(leaders.length>1){
    h+=`<div class="sec-head" style="margin-top:18px"><span class="sec-title">Championship Wins</span></div>
    <div class="ccard">`;
    leaders.forEach(({p,c})=>{
      h+=`<div class="honour-row">
        <div style="flex:1;font-family:'Playfair Display',serif;font-size:15px;font-weight:500">${p.name}</div>
        <div style="display:flex;gap:3px;align-items:center">${'🏆'.repeat(Math.min(c,5))}${c>5?`<span style="font-size:12px;color:var(--text3)"> +${c-5}</span>`:''}</div>
        <div style="font-size:16px;font-weight:700;color:var(--gold);font-family:'Playfair Display',serif;min-width:22px;text-align:right;margin-left:10px">${c}</div>
      </div>`;
    });
    h+=`</div>`;
  }
  return h;
}

// ── COURSES ───────────────────────────────────────────────────────────────────
function renderCourses(){
  const q=(document.getElementById('csr')?.value||'').toLowerCase();
  const filtered=S.courses.map((c,i)=>({...c,i})).filter(c=>c.name.toLowerCase().includes(q));
  let h=`<div style="display:flex;gap:8px;align-items:center;margin-bottom:6px">
    <input type="search" placeholder="Search courses…" id="csr" oninput="render()" style="flex:1">
    <button class="btn-p" onclick="OM('course')">+ Add</button>
  </div>
  <p style="font-size:11px;color:var(--text3);margin-bottom:14px;letter-spacing:.2px">Tap the ⓘ to expand course details</p>
  <div class="ccard">
    <div class="crow" style="font-size:9px;text-transform:uppercase;letter-spacing:1.4px;color:var(--text3);border-bottom:0.5px solid rgba(11,30,18,.1)">
      <span>Course</span><span style="text-align:center">Tee</span>
      <span style="text-align:center">Rating</span><span style="text-align:center">Slope</span><span></span>
    </div>`;
  filtered.forEach(c=>{
    const is9=c.rating<40,isO=OPEN_COURSE===c.i;
    h+=`<div class="crow">
      <span style="font-weight:500;display:flex;align-items:center;gap:6px">${c.name}${is9?`<span class="pill p9">9H</span>`:''}</span>
      <span style="text-align:center;color:var(--text3)">${c.tee}</span>
      <span style="text-align:center">${c.rating.toFixed(2)}</span>
      <span style="text-align:center">${c.slope}</span>
      <span style="text-align:center;display:flex;justify-content:center"><button class="info-btn${isO?' active':''}" onclick="TC(${c.i})">ⓘ</button></span>
    </div>`;
    if(isO)h+=`<div class="icard">
      <div><div class="ie-lbl">Course Rating</div><div class="ie-val">${c.rating.toFixed(2)}</div></div>
      <div><div class="ie-lbl">Slope Rating</div><div class="ie-val">${c.slope}</div></div>
      <div><div class="ie-lbl">Holes</div><div class="ie-val">${is9?'9-hole':'18-hole'}</div></div>
    </div>`;
  });
  if(!filtered.length)h+=`<div style="padding:30px;text-align:center;color:var(--text3);font-size:13px">No courses match</div>`;
  return h+`</div>`;
}

// ── MODALS ────────────────────────────────────────────────────────────────────
function renderScoreModal(p){
  const un=[...new Set(S.courses.map(c=>c.name))].sort();
  return`<div class="ov" onclick="if(event.target===this)CM()">
  <div class="mo">
    <div class="mo-title">Add Round — ${p.name}</div>
    <div class="fr"><label class="fl">Course</label>
      <select id="mc" onchange="UM()"><option value="">Select a course…</option>${un.map(n=>`<option>${n}</option>`).join('')}</select>
    </div>
    <div class="fr" id="mtr" style="display:none"><label class="fl">Tee</label><div id="mtc"></div></div>
    <div id="mci" style="display:none;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px"></div>
    <div class="fr"><label class="fl">Gross Score</label>
      <input type="number" id="msc" min="1" max="250" placeholder="e.g. 87" oninput="UM()">
    </div>
    <div id="mdp" style="display:none;padding:11px 14px;background:var(--parchment);border-radius:var(--r);margin-bottom:14px;font-size:13px"></div>
    <div id="mer" style="color:var(--danger);font-size:13px;margin-bottom:12px;display:none"></div>
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button class="btn-s" onclick="CM()">Cancel</button>
      <button class="btn-p" onclick="SS('${p.id}')">Save Round</button>
    </div>
  </div></div>`;
}

function renderCourseModal(){
  return`<div class="ov" onclick="if(event.target===this)CM()">
  <div class="mo">
    <div class="mo-title">Add New Course</div>
    <div class="fr"><label class="fl">Course Name</label><input type="text" id="an" placeholder="e.g. Royal Portrush"></div>
    <div class="fr"><label class="fl">Tee Colour</label>
      <select id="at"><option>Yellow</option><option>White</option><option>Blue</option><option>Red</option></select>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px">
      <div><label class="fl">Course Rating</label><input type="number" step="0.1" id="ar" placeholder="e.g. 72.4" oninput="ATP()"></div>
      <div><label class="fl">Slope Rating</label><input type="number" id="as" placeholder="e.g. 128"></div>
    </div>
    <div id="atp" style="display:none;padding:10px 13px;border-radius:var(--r);margin-bottom:12px;font-size:13px;font-weight:500"></div>
    <div id="aer" style="color:var(--danger);font-size:13px;margin-bottom:12px;display:none"></div>
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button class="btn-s" onclick="CM()">Cancel</button>
      <button class="btn-p" onclick="SC2()">Add Course</button>
    </div>
  </div></div>`;
}

function renderTournamentModal(){
  return`<div class="ov" onclick="if(event.target===this)CM()">
  <div class="mo">
    <div class="mo-title">New Tournament</div>
    <div class="fr"><label class="fl">Tournament Name</label>
      <input type="text" id="tn" placeholder="e.g. Summer Cup 2025">
    </div>
    <div class="fr"><label class="fl">Date</label><input type="date" id="td"></div>
    <div class="divider"></div>
    <p style="font-size:10px;color:var(--text3);margin-bottom:12px;text-transform:uppercase;letter-spacing:1px;font-weight:600">Enter each player's score — leave blank if not attending</p>
    <div style="margin-bottom:16px">
      ${S.players.map(p=>`<div class="tp-row">
        <label style="font-size:14px;font-weight:500;color:var(--text)">${p.name}</label>
        <input type="number" id="tp-${p.id}" placeholder="+2 or −3" style="text-align:center" oninput="TW_update()">
      </div>`).join('')}
    </div>
    <div class="fr" id="twinner-row">
      <label class="fl">Champion <span style="color:var(--text3);font-weight:400;text-transform:none;letter-spacing:0">(auto-selects lowest score)</span></label>
      <select id="twinner"><option value="">Enter scores above…</option></select>
    </div>
    <div id="ter" style="color:var(--danger);font-size:13px;margin-bottom:12px;display:none"></div>
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button class="btn-s" onclick="CM()">Cancel</button>
      <button class="btn-p" onclick="ST()">Save Tournament</button>
    </div>
  </div></div>`;
}

// ── HANDLERS ──────────────────────────────────────────────────────────────────
window.SV=v=>{V=v;OPEN_COURSE=null;OPEN_SCORE=null;render();};
window.OP=id=>{PID=id;render();};
window.CP=()=>{PID=null;MOD=null;OPEN_SCORE=null;render();};
window.OT=id=>{TID=id;render();};
window.CT=()=>{TID=null;render();};
window.OM=m=>{MOD=m;render();};
window.CM=()=>{MOD=null;render();};
window.TC=i=>{OPEN_COURSE=OPEN_COURSE===i?null:i;render();};
window.TSC=(pid,idx)=>{OPEN_SCORE=(OPEN_SCORE&&OPEN_SCORE.pid===pid&&OPEN_SCORE.idx===idx)?null:{pid,idx};render();};

window.TW_update=()=>{
  const scores=S.players.map(p=>{
    const el=document.getElementById('tp-'+p.id);
    const v=el?el.value.trim():'';
    if(v===''||isNaN(parseInt(v)))return null;
    return{p,v,n:parseInt(v)};
  }).filter(Boolean);
  const sel=document.getElementById('twinner');
  if(!sel)return;
  if(scores.length){
    const cur=sel.value;
    sel.innerHTML=scores.map(x=>`<option value="${x.p.id}"${x.p.id===cur?' selected':''}>${x.p.name} (${fmtScore(x.n)})</option>`).join('');
    if(!cur||!scores.find(x=>x.p.id===cur)){
      const best=scores.reduce((a,x)=>x.n<a.n?x:a);
      sel.value=best.p.id;
    }
  }else sel.innerHTML='<option value="">Enter scores above…</option>';
};

window.ST=()=>{
  const name=document.getElementById('tn')?.value.trim();
  const date=document.getElementById('td')?.value;
  const er=document.getElementById('ter');
  if(!er)return;
  if(!name){er.textContent='Please enter a tournament name.';er.style.display='block';return;}
  if(!date){er.textContent='Please select a date.';er.style.display='block';return;}
  const entries=S.players.map(p=>{
    const v=document.getElementById('tp-'+p.id)?.value;
    if(v===''||v===undefined||v===null)return null;
    const n=parseInt(v);if(isNaN(n))return null;
    return{playerId:p.id,playerName:p.name,score:n};
  }).filter(Boolean);
  if(entries.length<2){er.textContent='Please enter scores for at least 2 players.';er.style.display='block';return;}
  let winnerId=document.getElementById('twinner')?.value||null;
  if(!winnerId&&entries.length){const best=entries.reduce((a,b)=>b.score<a.score?b:a);winnerId=best.playerId;}
  upd({...S,tournaments:[...S.tournaments,{id:uid(),name,date,entries,winnerId}]});
  MOD=null;V='tournaments';
};

window.DT=id=>{
  if(!confirm('Delete this tournament?'))return;
  upd({...S,tournaments:S.tournaments.filter(t=>t.id!==id)});
  TID=null;
};

window.ATP=()=>{
  const r=parseFloat(document.getElementById('ar')?.value);
  const el=document.getElementById('atp');
  if(!el)return;
  if(isNaN(r)){el.style.display='none';return;}
  el.style.display='block';
  if(r<40){el.style.background='rgba(201,168,76,.12)';el.style.color='var(--gold-dim)';el.textContent='9-hole course (rating < 40)';}
  else{el.style.background='rgba(42,96,64,.08)';el.style.color='var(--success)';el.textContent='18-hole course';}
};

window.UM=()=>{
  const cn=document.getElementById('mc')?.value;
  const sv=document.getElementById('msc')?.value;
  const tr=document.getElementById('mtr'),tc=document.getElementById('mtc');
  const ci=document.getElementById('mci'),dp=document.getElementById('mdp');
  if(!tr||!tc||!ci||!dp)return;
  if(!cn){tr.style.display='none';ci.style.display='none';dp.style.display='none';return;}
  const tees=S.courses.filter(c=>c.name===cn).map(c=>c.tee);
  let tee=tees[0];
  tr.style.display='block';
  if(tees.length>1){
    if(!document.getElementById('mts'))tc.innerHTML=`<select id="mts" onchange="UM()">${tees.map(t=>`<option>${t}</option>`).join('')}</select>`;
    tee=document.getElementById('mts')?.value||tees[0];
  }else tc.innerHTML=`<div style="padding:10px 13px;background:var(--parchment);border-radius:var(--r);font-size:14px;color:var(--text2)">${tee}</div>`;
  const c=S.courses.find(x=>x.name===cn&&x.tee===tee);
  if(c){
    ci.style.display='grid';
    ci.innerHTML=`<div class="scard normal"><div class="s-lbl">Course Rating</div><div style="font-size:16px;font-weight:600;color:var(--text)">${c.rating.toFixed(2)}</div></div>
    <div class="scard normal"><div class="s-lbl">Slope</div><div style="font-size:16px;font-weight:600;color:var(--text)">${c.slope}</div></div>`;
    if(sv&&parseInt(sv)){
      const d=calcDiff(parseInt(sv),c.rating,c.slope);
      dp.style.display='flex';dp.style.alignItems='center';dp.style.gap='10px';
      dp.innerHTML=`<span style="font-size:12px;color:var(--text3);text-transform:uppercase;letter-spacing:1px">Differential</span>
        <span style="font-family:'Playfair Display',serif;font-size:18px;font-weight:600" class="${d<0?'under':d>0?'over':'even'}">${d>=0?'+':''}${d.toFixed(1)}</span>
        <span class="pill ${c.rating<40?'p9':'p18'}" style="margin-left:2px">${c.rating<40?'9-hole':'18-hole'}</span>`;
    }else dp.style.display='none';
  }
};

window.SS=pid=>{
  const cn=document.getElementById('mc')?.value;
  const ts=document.getElementById('mts');
  const tees=S.courses.filter(c=>c.name===cn).map(c=>c.tee);
  const tee=ts?ts.value:tees[0]||'';
  const sv=document.getElementById('msc')?.value;
  const er=document.getElementById('mer');
  if(!er)return;
  if(!cn||!tee){er.textContent='Please select a course.';er.style.display='block';return;}
  const s=parseInt(sv);
  if(!s||s<1||s>250){er.textContent='Enter a valid score (1–250).';er.style.display='block';return;}
  upd({...S,players:S.players.map(p=>p.id===pid?{...p,scores:[...p.scores,{course:cn,tee,score:s}]}:p)});
  MOD=null;
};

window.DS=(pid,idx)=>{
  if(!confirm('Remove this round?'))return;
  upd({...S,players:S.players.map(p=>p.id===pid?{...p,scores:p.scores.filter((_,i)=>i!==idx)}:p)});
};

window.SC2=()=>{
  const name=document.getElementById('an')?.value.trim();
  const tee=document.getElementById('at')?.value;
  const r=parseFloat(document.getElementById('ar')?.value);
  const s=parseInt(document.getElementById('as')?.value);
  const er=document.getElementById('aer');
  if(!er)return;
  if(!name){er.textContent='Course name is required.';er.style.display='block';return;}
  if(isNaN(r)||r<10||r>80){er.textContent='Rating must be between 10 and 80.';er.style.display='block';return;}
  if(isNaN(s)||s<55||s>155){er.textContent='Slope must be between 55 and 155.';er.style.display='block';return;}
  upd({...S,courses:[...S.courses,{name,tee,rating:r,slope:s}]});
  MOD=null;
};
</script>
</body>
</html>
